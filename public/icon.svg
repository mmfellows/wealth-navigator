<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3"/>
  <!-- Compass tick marks -->
  <g stroke="#ffffff" stroke-width="4" opacity="0.5">
    <line x1="256" y1="52" x2="256" y2="80"/>
    <line x1="256" y1="432" x2="256" y2="460"/>
    <line x1="52" y1="256" x2="80" y2="256"/>
    <line x1="432" y1="256" x2="460" y2="256"/>
  </g>
  <!-- Minor tick marks -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.3">
    <line x1="400" y1="112" x2="385" y2="127"/>
    <line x1="112" y1="400" x2="127" y2="385"/>
    <line x1="400" y1="400" x2="385" y2="385"/>
    <line x1="112" y1="112" x2="127" y2="127"/>
  </g>
  <!-- Upward trending arrow / compass needle -->
  <g transform="translate(256, 256)">
    <!-- South needle (darker) -->
    <polygon points="0,0 -20,12 0,160 20,12" fill="#94a3b8" opacity="0.6"/>
    <!-- North needle (gold - pointing up-right like a chart going up) -->
    <polygon points="0,0 -20,-12 0,-160 20,-12" fill="url(#needle)"/>
  </g>
  <!-- Dollar sign in center -->
  <circle cx="256" cy="256" r="36" fill="#0f172a" opacity="0.8"/>
  <text x="256" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="#f59e0b">$</text>
  <!-- Cardinal labels -->
  <text x="256" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.7">N</text>
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.7">S</text>
  <text x="100" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.7">W</text>
  <text x="412" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.7">E</text>
</svg>
